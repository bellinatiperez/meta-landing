name: CI

on:
  push:
    branches: [main, develop, staging]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/bellinatiperez/meta-landing

permissions:
  contents: write
  packages: write

jobs:
  build-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.IAC_PAT }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:dev-${{ steps.sha.outputs.short }}

      - name: Update IAC
        run: |
          git clone https://x-access-token:${{ secrets.IAC_PAT }}@github.com/bellinatiperez/grwthy-k8s.git /tmp/iac
          cd /tmp/iac/overlays/dev/meta-landing
          sed -i '/name: ghcr.io\/bellinatiperez\/meta-landing/{n;s/newTag: .*/newTag: dev-${{ steps.sha.outputs.short }}/}' kustomization.yaml
          cd /tmp/iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/dev/meta-landing/kustomization.yaml
          git diff --staged --quiet || (git commit -m "chore(meta-landing): update dev image to dev-${{ steps.sha.outputs.short }}" && git push)

  release-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          pre_release_branches: staging
          append_to_pre_release_tag: rc

      - name: Update package.json version
        run: |
          npm version ${{ steps.tag.outputs.new_version }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || (git commit -m "chore: bump version to ${{ steps.tag.outputs.new_version }} [skip ci]" && git push)

  build-staging:
    needs: release-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.IAC_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release-staging.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:stg

      - name: Update IAC
        run: |
          git clone https://x-access-token:${{ secrets.IAC_PAT }}@github.com/bellinatiperez/grwthy-k8s.git /tmp/iac
          cd /tmp/iac/overlays/staging/meta-landing
          sed -i '/name: ghcr.io\/bellinatiperez\/meta-landing/{n;s/newTag: .*/newTag: "${{ needs.release-staging.outputs.new_version }}"/}' kustomization.yaml
          cd /tmp/iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/staging/meta-landing/kustomization.yaml
          git diff --staged --quiet || (git commit -m "chore(meta-landing): update staging image to ${{ needs.release-staging.outputs.new_version }}" && git push)

  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Update package.json version
        run: |
          npm version ${{ steps.tag.outputs.new_version }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || (git commit -m "chore: bump version to ${{ steps.tag.outputs.new_version }} [skip ci]" && git push)

  build-production:
    needs: release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.IAC_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update IAC
        run: |
          git clone https://x-access-token:${{ secrets.IAC_PAT }}@github.com/bellinatiperez/grwthy-k8s.git /tmp/iac
          cd /tmp/iac/overlays/production/meta-landing
          sed -i '/name: ghcr.io\/bellinatiperez\/meta-landing/{n;s/newTag: .*/newTag: "${{ needs.release.outputs.new_version }}"/}' kustomization.yaml
          cd /tmp/iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/production/meta-landing/kustomization.yaml
          git diff --staged --quiet || (git commit -m "chore(meta-landing): update production image to ${{ needs.release.outputs.new_version }}" && git push)

      - name: Sync main to develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout develop
          git merge origin/main --no-edit
          git push origin develop
